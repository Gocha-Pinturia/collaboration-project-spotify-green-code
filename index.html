<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="admin-layout">
      <header class="header">
        <ul class="menu header__nav_left">
          <li class="header__item">
            <a class="menu__nav" href="#"
              ><img src="./assets/icons/icon_home.svg" alt="" />
              <img src="./assets/icons/icon_homeA.svg" alt="icon home" />Home</a
            >
          </li>
          <li class="header__item">
            <a class="menu__nav" href="#"
              ><img
                src="./assets/icons/icon_discover.svg"
                alt="icon discover"
              />
              <img src="./assets/icons/icon_discoverA.svg" alt="" />Discover</a
            >
          </li>
          <li class="header__item search">
            <input
              type="text"
              placeholder="Search..."
              class="search__bar"
              name="search-bar"
            />
          </li>
        </ul>
        <ul class="menu header__nav_right">
          <li>
            <a class="menu__nav" href="#"
              ><img src="./assets/icons/icon_bell.svg" alt="icon bel" /><img
                src="./assets/icons/icon_bell.svg"
                alt="icon bel"
              />
            </a>
          </li>
          <li>
            <a class="menu__nav" href="#"
              ><img src="./assets/icons/icon_lock.svg" alt="icon lock" />
              <img src="./assets/icons/icon_lock.svg" alt="icon lock"
            /></a>
          </li>
          <li>
            <a class="menu__nav" href="#"
              ><img
                src="./assets/icons/icon_friends.svg"
                alt="icon friends" /><img
                src="./assets/icons/icon_friendsA.svg"
                alt="icon friends"
            /></a>
          </li>
          <li>
            <a class="menu__nav" href="#"
              ><img
                src="./assets/icons/icon_settings.svg"
                alt="icon settings" /><img
                src="./assets/icons/icon_settings.svg"
                alt="icon settings"
            /></a>
          </li>
          <li>
            <a class="menu__nav" href="#"
              ><img
                src="./assets/icons/icon_sprite.svg"
                alt="icon sprite" /><img
                src="./assets/icons/icon_sprite.svg"
                alt="icon sprite"
            /></a>
          </li>
        </ul>
      </header>
      <aside class="aside-bar">
        <ul class="aside-bar__list">
          <li class="aside-bar__item">
            <a class="aside-bar__link aside-bar__icon--active" href="#">
              <img
                src="./assets/icons/icon_library.svg"
                alt="icon library"
              /><img
                src="./assets/icons/icon_libraryA.svg"
                alt="icon library"
              />My Library</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img src="./assets/icons/icon_pins.svg" alt="icon pins" />Pins</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_playlists.svg"
                alt="icon playlists"
              />Playlists</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img src="./assets/icons/icon_liked.svg" alt="icon liked" />Liked
              songs</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_saves.svg"
                alt="icon saves"
              />Saves</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_albums.svg"
                alt="icon albums"
              />Albums</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_folders.svg"
                alt="icon folders"
              />Folders</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_podcasts.svg"
                alt="icon podcasts"
              />Podcasts</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_audiobooks.svg"
                alt="icon audiobooks"
              />Audiobooks</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_artists.svg"
                alt="icon artists"
              />Artists</a
            >
          </li>
        </ul>
      </aside>
    </div>
    <nav></nav>
    <main></main>
    <footer></footer>
  </body>
</html>
