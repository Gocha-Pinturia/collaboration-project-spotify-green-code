<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <div class="admin-layout">
      <header class="header">
        <ul class="menu header__nav_left">
          <li class="header__item">
            <a class="menu__nav" href="#"
              ><img src="./assets/icons/icon_home.svg" alt="" />
              <img src="./assets/icons/icon_homeA.svg" alt="icon home" />Home</a
            >
          </li>
          <li class="header__item">
            <a class="menu__nav" href="#"
              ><img
                src="./assets/icons/icon_discover.svg"
                alt="icon discover"
              />
              <img src="./assets/icons/icon_discoverA.svg" alt="" />Discover</a
            >
          </li>
          <li class="header__item search">
            <input
              type="text"
              placeholder="Search..."
              class="search__bar"
              name="search-bar"
            />
          </li>
        </ul>
        <ul class="menu header__nav_right">
          <li>
            <a class="menu__nav" href="#"
              ><img src="./assets/icons/icon_bell.svg" alt="icon bel" /><img
                src="./assets/icons/icon_bell.svg"
                alt="icon bel"
              />
            </a>
          </li>
          <li>
            <a class="menu__nav" href="#"
              ><img src="./assets/icons/icon_lock.svg" alt="icon lock" />
              <img src="./assets/icons/icon_lock.svg" alt="icon lock"
            /></a>
          </li>
          <li>
            <a class="menu__nav" href="#"
              ><img
                src="./assets/icons/icon_friends.svg"
                alt="icon friends" /><img
                src="./assets/icons/icon_friendsA.svg"
                alt="icon friends"
            /></a>
          </li>
          <li>
            <a class="menu__nav" href="#"
              ><img
                src="./assets/icons/icon_settings.svg"
                alt="icon settings" /><img
                src="./assets/icons/icon_settings.svg"
                alt="icon settings"
            /></a>
          </li>
          <li>
            <a class="menu__nav" href="#"
              ><img
                src="./assets/icons/icon_sprite.svg"
                alt="icon sprite" /><img
                src="./assets/icons/icon_sprite.svg"
                alt="icon sprite"
            /></a>
          </li>
        </ul>
      </header>
      <aside class="aside-bar">
        <ul class="aside-bar__list">
          <li class="aside-bar__item">
            <a class="aside-bar__link aside-bar__icon--active" href="#">
              <img
                src="./assets/icons/icon_library.svg"
                alt="icon library"
              /><img
                src="./assets/icons/icon_libraryA.svg"
                alt="icon library"
              />My Library</a
            >
          </li>
          <li class="aside-bar__item aside-bar__item--arrow-right">
            <a href="#" class="aside-bar__link"
              ><img src="./assets/icons/icon_pins.svg" alt="icon pins" />Pins</a
            >
          </li>
          <li class="aside-bar__item aside-bar__item--arrow-right">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_playlists.svg"
                alt="icon playlists"
              />Playlists</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img src="./assets/icons/icon_liked.svg" alt="icon liked" />Liked
              songs</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_saves.svg"
                alt="icon saves"
              />Saves</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_albums.svg"
                alt="icon albums"
              />Albums</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_folders.svg"
                alt="icon folders"
              />Folders</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_podcasts.svg"
                alt="icon podcasts"
              />Podcasts</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_audiobooks.svg"
                alt="icon audiobooks"
              />Audiobooks</a
            >
          </li>
          <li class="aside-bar__item">
            <a href="#" class="aside-bar__link"
              ><img
                src="./assets/icons/icon_artists.svg"
                alt="icon artists"
              />Artists</a
            >
          </li>
        </ul>
      </aside>
    </div>
    <nav></nav>
    <main></main>
    <footer class="player">
      <div class="controls">
        <button>
          <span class="material-symbols-outlined pause"> pause_circle </span>
          <span class="material-symbols-outlined play"> play_circle </span>
        </button>
        <button>
          <span class="material-symbols-outlined"> skip_previous </span>
        </button>
        <button>
          <span class="material-symbols-outlined"> skip_next </span>
        </button>
        <button>
          <span class="material-symbols-outlined"> shuffle </span>
        </button>
        <button class="repeat">
          <img src="./assets/footer-image/repeat.svg" alt="repeat" />
        </button>
      </div>

      <div class="progress-area">
        <p class="time">2:23</p>
        <div class="progress-bar">
          <div class="progress"></div>
        </div>
        <span class="time">4:45</span>
        <a href="#">
          <img src="./assets/footer-image/dynamics.svg" alt="dynamics" />
        </a>
      </div>

      <div class="song-info">
        <img src="./assets/footer-image/song-get.svg" alt="Get lucky" />

        <div class="song-text">
          <p class="song-title">Get Lucky</p>
          <p class="song-artist">Daft Punk</p>
          <p class="song-memories">Random Access Memories</p>
        </div>
      </div>
      <div class="actions">
        <ul>
          <li>
            <a href="#">
              <img src="./assets/footer-image/favourite.svg" alt="favorite" />
            </a>
          </li>
          <li>
            <a href="#">
              <img
                src="./assets/footer-image/add-playlist.svg"
                alt="add-playlist"
              />
            </a>
          </li>
          <li>
            <a href="#">
              <img src="./assets/footer-image/lyrics.svg" alt="lyrics" />
            </a>
          </li>
          <li>
            <a href="#">
              <img src="./assets/footer-image/device.svg" alt="device" />
            </a>
          </li>
          <li>
            <a href="#">
              <img src="./assets/footer-image/semicolon.svg" alt="colon" />
            </a>
          </li>
          <li>
            <img src="./assets/footer-image/horizontal.svg" alt="horizontal" />
          </li>
          <li>
            <a href="#">
              <img src="./assets/footer-image/dj.svg" alt="colon" />
            </a>
          </li>
          <li>
            <a href="#">
              <img src="./assets/footer-image/default.svg" alt="colon" />
            </a>
          </li>
        </ul>
      </div>
    </footer>
  </body>
</html>
